name: PNPM Recursive Build & Test

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 23.x]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: intheblack
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: intheblack_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://intheblack:testpassword@localhost:5432/intheblack_test
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'
    - run: pnpm install
    - run: pnpm build
    - name: Run database migrations
      run: pnpm --filter @watcher/db db:migrate
    - name: Run database seeds
      run: pnpm --filter @watcher/db db:seed
    - run: pnpm lint
    - run: pnpm test

  trivy-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v4
    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: 'pnpm'
    - run: pnpm install
    - name: Run Trivy vulnerability scanner for filesystem dependencies
      # Scans the entire filesystem, including pnpm-lock.yaml, for library vulnerabilities
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'library'
        severity: 'CRITICAL,HIGH'

