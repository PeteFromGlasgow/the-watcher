apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  labels:
    app: webapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
        - name: webapp
          image: ghcr.io/petefromglasgow/in-the-black/webapp
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: webapp-config
