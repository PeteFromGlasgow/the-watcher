apiVersion: apps/v1
kind: Deployment
metadata:
  name: oathkeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oathkeeper
  template:
    metadata:
      labels:
        app: oathkeeper
    spec:
      containers:
        - name: oathkeeper
          image: oryd/oathkeeper:v25.4.0
          args:
            - serve
            - --config
            - /etc/config/oathkeeper/oathkeeper.yaml
          ports:
            - name: http-proxy
              containerPort: 4455
            - name: http-api
              containerPort: 4456
          volumeMounts:
            - name: oathkeeper-config
              mountPath: /etc/config/oathkeeper
      volumes:
        - name: oathkeeper-config
          configMap:
            name: oathkeeper-config
---
