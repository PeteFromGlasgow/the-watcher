apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: watcher-operator-role
rules:
  # Watch CRD management
  - apiGroups:
      - watcher.io
    resources:
      - watches
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - watcher.io
    resources:
      - watches/status
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - watcher.io
    resources:
      - watches/finalizers
    verbs:
      - update
  # CronJob management
  - apiGroups:
      - batch
    resources:
      - cronjobs
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # Secret reading (for transport/notifier credentials)
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
  # Event creation (for operator audit trail)
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  # Leader election
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
